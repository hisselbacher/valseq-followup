<script>
  // ⚠️ IMPORTANT: Replace this URL with your actual Google Apps Script deployment URL
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxamKeVOnwpXUgL0JEwvlBjZLq-VIkveaojYvjVjT-cfCWQcWHGQJkOhwhUdWNPSI97/exec';
  
  const form = document.getElementById('pidForm');
  const pidInput = document.getElementById('pid');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const loadingScreen = document.getElementById('loadingScreen');
  
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const pid = pidInput.value.trim();
    
    if (!pid) {
      showError('Please enter your Prolific ID');
      return;
    }
    
    // Clear previous errors
    errorMessage.classList.remove('show');
    
    // Show button loading
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    
    // Create an iframe to load the Apps Script response
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.name = 'redirectFrame';
    document.body.appendChild(iframe);
    
    // Create a form that submits to the iframe
    const redirectForm = document.createElement('form');
    redirectForm.method = 'GET';
    redirectForm.action = APPS_SCRIPT_URL;
    redirectForm.target = 'redirectFrame';
    
    const pidField = document.createElement('input');
    pidField.type = 'hidden';
    pidField.name = 'pid';
    pidField.value = pid;
    redirectForm.appendChild(pidField);
    
    document.body.appendChild(redirectForm);
    redirectForm.submit();
    
    // Monitor the iframe for the redirect
    let checkCount = 0;
    const maxChecks = 50; // Check for 5 seconds
    
    const checkInterval = setInterval(function() {
      checkCount++;
      
      try {
        // Try to read the iframe content
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const html = iframeDoc.documentElement.innerHTML;
        
        // Look for REDCap URL
        const urlPattern = /https?:\/\/redcap\.stanford\.edu[^\s"'<>]*/g;
        const matches = html.match(urlPattern);
        
        if (matches && matches.length > 0) {
          clearInterval(checkInterval);
          const surveyLink = matches[0];
          
          // Show success screen
          loadingScreen.classList.add('show');
          
          // Cleanup
          document.body.removeChild(iframe);
          document.body.removeChild(redirectForm);
          
          // Redirect
          setTimeout(function() {
            window.location.href = surveyLink;
          }, 1000);
        } else if (html.toLowerCase().includes('error') || html.toLowerCase().includes('not found')) {
          clearInterval(checkInterval);
          showError('No matching participant found. Please check your Prolific ID.');
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          document.body.removeChild(iframe);
          document.body.removeChild(redirectForm);
        }
      } catch (e) {
        // Can't read iframe (cross-origin), wait for it to load
      }
      
      if (checkCount >= maxChecks) {
        clearInterval(checkInterval);
        showError('Request timed out. Please try again.');
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        try {
          document.body.removeChild(iframe);
          document.body.removeChild(redirectForm);
        } catch(e) {}
      }
    }, 100);
  });
  
  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add('show');
  }
  
  // Auto-focus
  pidInput.focus();
</script>
